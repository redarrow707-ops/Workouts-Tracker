<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.5">
<title>Workouts Tracker 3.01 - Pro</title>

<style>
body{font-family:-apple-system;background:#f4f4f9;margin:0;padding:25px}
.day-card{background:#fff;border-radius:18px;margin-bottom:30px;box-shadow:0 12px 20px rgba(0,0,0,.1);overflow:hidden}
.day-header{background:#2c3e50;color:#fff;padding:18px;font-size:1.5rem}
.warmup{background:#eef2f7;padding:14px;font-weight:bold;font-style:italic;border-bottom:1px solid #dee2e6}
table{width:100%;border-collapse:collapse}
	
th{background:#f8f9fa;color:#7f8c8d;padding:12px 6px;text-transform:uppercase;font-size:0.85rem}
td{border-bottom:1px solid #eee;padding:10px;text-align:center;font-size:1.1rem}
	
.td-ex{text-align:left;padding-left:20px}
.ex-name{color:#2980b9;font-weight:bold;cursor:pointer;text-decoration:underline}

/* Bottone Link Manuale */
.video-link { color: #3498db; text-decoration: none; font-weight: bold; font-size: 0.75rem; border: 1px solid #3498db; padding: 3px 6px; border-radius: 4px; text-transform: uppercase; }
.video-link:hover { background: #3498db; color: white; }

/* Riga Totale Gialla */
.total-row { background: #ffff00 !important; font-weight: bold; }
.total-label { text-align: right; padding-right: 20px; color: #000; text-transform: uppercase; font-size: 0.85rem; }
.total-value { color: #000; font-size: 1.3rem; text-align: center; }
	
input{width:50px;padding:6px;border-radius:6px;border:1px solid #ccc;text-align:center;font-size:1.1rem}
.vol-display{font-weight:bold;color:#27ae60}

.pr{background:#d4f8d4!important;animation:glow .8s}
@keyframes glow{from{background:#b6f0b6}to{background:#d4f8d4}}

#globalBar{
position:sticky;top:0;background:#27ae60;color:white;font-size:1.4rem;
padding:14px;text-align:center;z-index:999;box-shadow:0 4px 8px rgba(0,0,0,.2)
}

.print-container{text-align:center;margin:40px}
.print-btn{background:#27ae60;color:white;padding:15px 30px;font-size:1.2rem;border:0;border-radius:10px;cursor:pointer}

#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:2000}
.modal-content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:500px;width:95%;text-align:center}
.modal-content img{width:100%;border-radius:12px}
.close-btn{color:white;font-size:40px;position:absolute;top:-50px;right:0;cursor:pointer}

@media print{
#globalBar,.print-container,#modal,.video-link{display:none}
input{border:0;background:none}
.ex-name{text-decoration:none;color:black}
.day-card{box-shadow:none;border:1px solid #ccc}
}
</style>
</head>
<body>

<div id="globalBar">📊 Volume Totale Settimana: <span id="globalTotal">0</span> kg</div>

<h1 style="text-align:center; color:#2c3e50;">Workout Tracker Multifrequenza</h1>
<div id="app"></div>

<div class="print-container">
<button class="print-btn" onclick="window.print()">🖨️ Stampa Scheda</button>
</div>

<div id="modal" onclick="closeImage()">
<div class="modal-content">
<div class="close-btn">×</div>
<div id="exTitle" style="color:white;margin-bottom:10px; font-size:1.4rem"></div>
<img id="exImage">
</div>
</div>

<script>

 */

        ]

        day: "Giorno B: Core 1",
	    warm: "Jumping Jacks (2 min) - Riposo : 1:30 min",
        ex: [
            ["1 - Plank", "60s+", "IMG/Plank.jpg", "https://www.muscleandstrength.com/exercises/hover.html"],
            ["2 - Bicycle Crunches", "3x40/60s", "IMG/Bicyclecrunch.jpg", "https://www.muscleandstrength.com/exercises/abdominal-air-bike.html"],
            ["3 - Jacknife Swiss ball", "3x16-18", "IMG/Jacknifepallasvizzera.jpg", "https://www.muscleandstrength.com/exercises/bench-jack-knife.html"],
            ["4 - Core AB Wheel Rollout", "3x10-12", "IMG/Corewheelrollout.jpg", "https://www.muscleandstrength.com/exercises/abdominal-barbell-rollouts.html"],
            ["5 - Russian Twists", "3x30-32", "IMG/Russiantwists.jpg", "https://www.muscleandstrength.com/exercises/russian-twist.html"],
            ["6 - Crunch obliqui", "3x10-12", "IMG/Spidermancrunch.jpg", "#"],
            ["7 - V-Up", "3x10-12", "IMG/Vup.jpg", "https://www.muscleandstrength.com/exercises/floor-reach.html"],
            ["8 - Sit Up", "4x10-12", "IMG/Situp.jpg", "https://www.muscleandstrength.com/exercises/sit-up.html"],
            ["9 - Hanging Leg Raises", "2x8-10", "IMG/Hanginglegraises.jpg", "https://www.muscleandstrength.com/exercises/hanging-leg-raise.html"],
            ["10 - Hollow body Hold Plank", "4x30s", "IMG/Backplank.jpg", "https://www.muscleandstrength.com/exercises/hollow-body-hold"]
        ]
    },
    {
        day: "Giorno C: Upper body - BACK",
        warm: "Jumping Jacks (2 min) - Riposo : 2:30 min",
        ex: [
            ["1 - Remata con manubri", "4x10-12", "IMG/Rematore.jpg", "#"],
            ["2 - Low Pulley", "4x16-20", "IMG/Pulleybasso.jpg", "#"],
            ["3 - Pressa inclinata bilanciere", "4x8-10", "IMG/Inclinebenchpress.jpg", "#"],
            ["4 - Trazioni alla Sbarra", "3x8-10", "IMG/Trazionisbarra.jpg", "#"],
            ["5 - Fly manubri panca inclinata", "4x10-12", "IMG/Inclinedumbbellfly.jpg", "#"],
            ["6 - Lat Machine dietro", "4x10-12", "IMG/Behindtheneck.jpg", "https://www.muscleandstrength.com/exercises/behind-neck-lat-pull-down.html"],
            ["7 - Push Up", "4x10-12", "IMG/Pushup.jpg", "#"],
            ["8 - Floor French Press", "2x10-12", "IMG/Floorfrenchpress.jpg", "#"]
        ]

        warm: "Jumping Jacks (2 min) - Riposo : 3 min",
        ex: [
			["1 - Stacchi da terra bilanciere", "3x8-10", "IMG/Deadlift.jpg", "#"],
            ["2 - Goblet Squat", "3x10-12", "IMG/Gobletsquat.jpg", "#"],

            ["5 - Landmine Suitcase Squat", "3x10-12", "IMG/Landminesuitcasesquat.jpg", "#"],
            ["6 - Sumo Squat", "3x10-12", "IMG/Sumosquat.jpg", "#"],

			["8 - Squat cosacchi", "3x10-12", "IMG/Cossacksquat.jpg", "#"],

        ]
    },
    {
        day: "Giorno E: Upper body - SHOULDERS",
        warm: "Jumping Jacks (2 min) - Riposo : 2:30 min",
        ex: [
            ["1 - Dumbbell Military Press", "4x8-10", "IMG/Militarypress.jpg", "#"],
            ["2 - Alzate Laterali", "4x10-12", "IMG/Lateralraises.jpg", "#"],

            ["5 - Curl a Martello", "3x10-12", "IMG/Dumbbelhammercurl.jpg", "#"],
            ["6 - Estensioni dietro nuca", "3x8-10", "IMG/overheadtricepsextensions.jpg", "#"],
	        ["7 - Floor French Press", "4x10-12", "IMG/Floorfrenchpress.jpg", "#"],

	{
        day: "ARMS SUPERSET",

        ex: [

            ["RIPOSO 2:30 min", " - ", "IMG/Rest.jpg", "#"],
	        ["C1 - Pushdown corda", "3x12-15", "IMG/Ropepushdown.jpg", "#"],
            ["C2 - Curl a Martello", "3x12-15", "IMG/Dumbbelhammercurl.jpg", "#"],
			["RIPOSO 2:30 min", " - ", "IMG/Rest.jpg", "#"],
	        ["D1 - Wrist Curl", "3x12-15", "IMG/Wristcurl.jpg", "#"],
            ["D2 - Reverse Wrist Curl", "3x12-15", "IMG/Reversewristcurl.jpg", "#"]
        ]
    }
];

function render(){
    const app=document.getElementById('app');
    app.innerHTML='';
    workout.forEach((w,d)=>{
        let html=`<div class="day-card">
            <div class="day-header">${w.day}</div>
            <div class="warmup">${w.warm}</div>
            <table>
                <thead>
                    <tr>
                        <th class="th-ex">Esercizio</th>
                        <th>Target</th>
                        <th>Video</th>
                        <th>Kg</th>
                        <th>Tot Reps</th>
                        <th>Volume</th>
                    </tr>
                </thead>
                <tbody>`;
        
        let dayTot=0;

        w.ex.forEach((e,i)=>{
            const wv=localStorage.getItem(`weight-${d}-${i}`)||'';
            const rv=localStorage.getItem(`reps-${d}-${i}`)||'';
            const vol=(wv && rv)?(parseFloat(wv)*parseFloat(rv)):0;
            dayTot+=vol;

            const manualLink = e[3] || "#";

            html+=`<tr>
                <td class="td-ex"><span class="ex-name" onclick="openImage('${e[0]}','${e[2]}')">${e[0]}</span></td>
                <td style="color:#7f8c8d; font-size:0.8rem">${e[1]}</td>
                <td>${manualLink !== "#" ? `<a href="${manualLink}" target="_blank" class="video-link">Video</a>` : '-'}</td>
                <td><input type="number" id="w-${d}-${i}" value="${wv}" oninput="updateValues(${d},${i})"></td>
                <td><input type="number" id="r-${d}-${i}" value="${rv}" oninput="updateValues(${d},${i})"></td>
                <td><span class="vol-display" id="v-${d}-${i}">${vol.toFixed(1)}</span></td>
            </tr>`;
        });

        html+=`</tbody>
            <tfoot>
                <tr class="total-row">
                    <td colspan="5" class="total-label">Volume Totale Giorno</td>
                    <td class="total-value"><span id="day-total-${d}">${dayTot.toFixed(1)}</span> kg</td>
                </tr>
            </tfoot>
            </table></div>`;
        app.innerHTML+=html;
    });
    updateGlobalTotal();
}

function updateValues(d,i){
    const wInput=document.getElementById(`w-${d}-${i}`);
    const rInput=document.getElementById(`r-${d}-${i}`);
    const vDisplay=document.getElementById(`v-${d}-${i}`);
    const row=wInput.closest('tr');
    
    let vol=0;
    if(wInput.value && rInput.value){
        vol = parseFloat(wInput.value) * parseFloat(rInput.value);
        vDisplay.innerText = vol.toFixed(1);
    } else {
        vDisplay.innerText = "0.0";
    }

    localStorage.setItem(`weight-${d}-${i}`, wInput.value);
    localStorage.setItem(`reps-${d}-${i}`, rInput.value);

    // Gestione PR (Personal Record)
    const best=parseFloat(localStorage.getItem(`best-${d}-${i}`)||0);
    if(vol > best && vol > 0){
        localStorage.setItem(`best-${d}-${i}`, vol);
        row.classList.add('pr');
        setTimeout(()=>row.classList.remove('pr'), 800);
    }

    updateDayTotal(d);
    updateGlobalTotal();
}

function updateDayTotal(d){
    let t=0;
    workout[d].ex.forEach((_,i)=>{
        t += parseFloat(document.getElementById(`v-${d}-${i}`).innerText || 0);
    });
    document.getElementById(`day-total-${d}`).innerText = t.toFixed(1);
}

function updateGlobalTotal(){
    let g=0;
    workout.forEach((_,d)=>{
        const dayVal = document.getElementById(`day-total-${d}`);
        if(dayVal) g += parseFloat(dayVal.innerText || 0);
    });
    document.getElementById('globalTotal').innerText = g.toFixed(1);
}

function openImage(t,s){
    document.getElementById('exTitle').innerText=t;
    document.getElementById('exImage').src=s;
    document.getElementById('modal').style.display="block";
}
function closeImage(){
    document.getElementById('modal').style.display="none";
}

// Inizializzazione
render();
</script>
</body>
</html>
