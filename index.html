<title>Workouts Tracker 3.0 - Multi-Schede</title>

<style>
body{font-family:-apple-system;background:#f4f4f9;margin:0;padding:25px}
.day-card{background:#fff;border-radius:18px;margin-bottom:30px;box-shadow:0 12px 20px rgba(0,0,0,.1);overflow:hidden}
.day-header{background:#2c3e50;color:#fff;padding:18px;font-size:1.5rem}
.warmup{background:#eef2f7;padding:14px;font-weight:bold;font-style:italic;border-bottom:1px solid #dee2e6}
table{width:100%;border-collapse:collapse}
	
th{background:#f8f9fa;color:#7f8c8d;padding:12px 6px;text-transform:uppercase;font-size:0.85rem}
td{border-bottom:1px solid #eee;padding:10px;text-align:center;font-size:1.1rem}
	
.td-ex{text-align:left;padding-left:20px}
.ex-name{color:#2980b9;font-weight:bold;cursor:pointer;text-decoration:underline}

.video-link { color: #3498db; text-decoration: none; font-weight: bold; font-size: 0.75rem; border: 1px solid #3498db; padding: 3px 6px; border-radius: 4px; text-transform: uppercase; }
.video-link:hover { background: #3498db; color: white; }

/* Riga Totale Gialla */
.total-row { background: #ffff00 !important; font-weight: bold; }
.total-label { text-align: right; padding-right: 20px; color: #000; text-transform: uppercase; font-size: 0.85rem; }
.total-value { color: #000; font-size: 1.3rem; text-align: center; }
	
input{width:50px;padding:6px;border-radius:6px;border:1px solid #ccc;text-align:center;font-size:1.1rem}
.vol-display{font-weight:bold;color:#27ae60}

#globalBar{
position:sticky;top:0;background:#27ae60;color:white;
padding:10px;text-align:center;z-index:999;box-shadow:0 4px 8px rgba(0,0,0,.2);
display: flex; flex-direction: column; align-items: center; gap: 8px;
}

/* Selettore Nuova Pagina/Workout */
#workoutSelector {
    padding: 8px 15px; border-radius: 8px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; background: white; color: #27ae60;
}

.pr{background:#d4f8d4!important;animation:glow .8s}
@keyframes glow{from{background:#b6f0b6}to{background:#d4f8d4}}

.print-container{text-align:center;margin:40px}
.print-btn{background:#27ae60;color:white;padding:15px 30px;font-size:1.2rem;border:0;border-radius:10px;cursor:pointer}

#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:2000}
.modal-content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:500px;width:95%;text-align:center}
.modal-content img{width:100%;border-radius:12px}
.close-btn{color:white;font-size:40px;position:absolute;top:-50px;right:0;cursor:pointer}

@media print{
#globalBar,.print-container,#modal,.video-link{display:none}
input{border:0;background:none}
.ex-name{text-decoration:none;color:black}
}
</style>

let currentWorkoutID = localStorage.getItem('selectedWorkout') || 'schedaA';

function changeWorkout(id) {
    currentWorkoutID = id;
    localStorage.setItem('selectedWorkout', id);
    render();
}

function render(){
    const app = document.getElementById('app');
    const workoutData = allWorkouts[currentWorkoutID];
    document.getElementById('mainTitle').innerText = workoutData.title;
    document.getElementById('workoutSelector').value = currentWorkoutID;
    
    app.innerHTML = '';
    
    workoutData.days.forEach((w, d) => {
        let html = `<div class="day-card">
            <div class="day-header">${w.day}</div>
            <div class="warmup">${w.warm}</div>
            <table>
                <thead>
                    <tr>
                        <th class="th-ex">Esercizio</th>
                        <th>Target</th>
                        <th>Video</th>
                        <th>Kg</th>
                        <th>Reps</th>
                        <th>Volume</th>
                    </tr>
                </thead>
                <tbody>`;
        
        let dayTot = 0;

        w.ex.forEach((e, i) => {
            // NOTA: La chiave di salvataggio ora include l'ID del workout per non sovrascrivere i dati
            const wv = localStorage.getItem(`${currentWorkoutID}-weight-${d}-${i}`) || '';
            const rv = localStorage.getItem(`${currentWorkoutID}-reps-${d}-${i}`) || '';
            const vol = (wv && rv) ? (parseFloat(wv) * parseFloat(rv)) : 0;
            dayTot += vol;

            const manualLink = e[3] || "#";

            html += `<tr>
                <td class="td-ex"><span class="ex-name" onclick="openImage('${e[0]}','${e[2]}')">${e[0]}</span></td>
                <td style="color:#7f8c8d; font-size:0.8rem">${e[1]}</td>
                <td>${manualLink !== "#" ? `<a href="${manualLink}" target="_blank" class="video-link">Video</a>` : '-'}</td>
                <td><input type="number" id="w-${d}-${i}" value="${wv}" oninput="updateValues(${d},${i})"></td>
                <td><input type="number" id="r-${d}-${i}" value="${rv}" oninput="updateValues(${d},${i})"></td>
                <td><span class="vol-display" id="v-${d}-${i}">${vol.toFixed(1)}</span></td>
            </tr>`;
        });

        html += `</tbody>
            <tfoot>
                <tr class="total-row">
                    <td colspan="5" class="total-label">Volume Totale Giorno</td>
                    <td class="total-value"><span id="day-total-${d}">${dayTot.toFixed(1)}</span> kg</td>
                </tr>
            </tfoot>
            </table></div>`;
        app.innerHTML += html;
    });
    updateGlobalTotal();
}

function updateValues(d, i){
    const wInput = document.getElementById(`w-${d}-${i}`);
    const rInput = document.getElementById(`r-${d}-${i}`);
    const vDisplay = document.getElementById(`v-${d}-${i}`);
    
    let vol = 0;
    if(wInput.value && rInput.value){
        vol = parseFloat(wInput.value) * parseFloat(rInput.value);
        vDisplay.innerText = vol.toFixed(1);
    } else {
        vDisplay.innerText = "0.0";
    }

    // Salvataggio con prefisso della scheda attuale
    localStorage.setItem(`${currentWorkoutID}-weight-${d}-${i}`, wInput.value);
    localStorage.setItem(`${currentWorkoutID}-reps-${d}-${i}`, rInput.value);

    updateDayTotal(d);
    updateGlobalTotal();
}

function updateDayTotal(d){
    let t = 0;
    const volumes = document.querySelectorAll(`[id^="v-${d}-"]`);
    volumes.forEach(v => t += parseFloat(v.innerText || 0));
    document.getElementById(`day-total-${d}`).innerText = t.toFixed(1);
}

function updateGlobalTotal(){
    let g = 0;
    const dayTotals = document.querySelectorAll(`[id^="day-total-"]`);
    dayTotals.forEach(dt => g += parseFloat(dt.innerText || 0));
    document.getElementById('globalTotal').innerText = g.toFixed(1);
}

function openImage(t,s){
    document.getElementById('exTitle').innerText=t;
    document.getElementById('exImage').src=s;
    document.getElementById('modal').style.display="block";
}
function closeImage(){
    document.getElementById('modal').style.display="none";
}

render();
</script>
</body>
</html>
